<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>Toast's Portfolio</title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="CSS/topbar.css">
        <link rel="stylesheet" href="CSS/content.css">
        <link rel="stylesheet" href="CSS/form.css">

        <body id="container">
        <div class="topbar">
            <!-- Left side: logo -->
            <div class="topbar-left">
            <img src="Images/toast-icon.png" id="topbar-icon">
            </div>

            <!-- Center: Heading -->
            <div class="topbar-center">
            <h1>Contact Me!</h1>
            </div>
            <!-- Right side: slider and nav -->
            <div class="topbar-right">
            <label class="switch" for="checkbox">
                <input type="checkbox" id="checkbox" class="checkbox">
                <div class="slider round"></div>
            </label>

            <nav>
                <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="projects.html">Projects</a></li>
                <li><a href="pastwork.html">Past Work</a></li>
                <li><a href="contact-me.html">Contact Me</a></li>
                </ul>
            </nav>
            </div>
        </div>
        <br>
<form class="my-form" action="https://formspree.io/f/mjkrnkoj" method="POST">
  <div class="container">
    <h1>Let's work together!</h1>
    <ul>
      <li>
        <select name="work_type" required>
          <option selected disabled>-- Please choose an option --</option>
          <option>Comission</option>
          <option>Part-time</option>
          <option>Full-Time</option>
          <option>Other</option>
        </select>
      </li>
      <li>
        <div class="grid grid-2">
          <input type="text" name="name" placeholder="Name" required> 
          <input type="text" name="surname" placeholder="Surname" required>
        </div>
      </li>
      <li>
        <div class="grid grid-2">
          <input type="email" name="email" placeholder="Email" required>  
          <input type="tel" name="phone" placeholder="Phone">
        </div>
      </li>    
      <li>
        <textarea name="message" placeholder="Message"></textarea>
      </li>   
      <li>
        <input type="checkbox" id="terms" name="terms" required>
        <label for="terms">I have read and agreed with <a href="#">the terms and conditions.</a></label>
      </li>  
      <li>
        <div class="grid grid-3">
          <div class="required-msg">REQUIRED FIELDS</div>
          <button class="btn-grid" type="submit">
            <span class="back">
              <img src="https://s3-us-west-2.amazonaws.com/s.cdpn.io/162656/email-icon.svg" alt="">
            </span>
            <span class="front">SUBMIT</span>
          </button>
          <button class="btn-grid" type="reset">
            <span class="back">
              <img src="https://s3-us-west-2.amazonaws.com/s.cdpn.io/162656/eraser-icon.svg" alt="">
            </span>
            <span class="front">RESET</span>
          </button> 
        </div>
      </li>
    </ul>
  </div>
</form>
        <script type="text/javascript">
        const checkbox = document.getElementById('checkbox');
        const body = document.body;

        checkbox.addEventListener('change', function () {
            body.classList.toggle('dark', this.checked);
        });
        </script>
        <script src="" async defer></script>
    </body>
</html>
